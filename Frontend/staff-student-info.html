<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Information - AuthoDocs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background-color:#f8f9fa}
        .wrapper{display:flex}
        .sidebar{width:280px;min-height:100vh;background-color:#212529;color:#fff;flex-shrink:0}
        .sidebar .navbar-brand{text-align:center;display:block;padding-top:1.5rem;margin-bottom:2rem}
        .sidebar .navbar-brand img{height:40px}
        .sidebar-nav .nav-link{color:#adb5bd;font-weight:500;padding:.75rem 1.5rem;border-radius:8px}
        .sidebar-nav .nav-link:hover{background-color:#343a40;color:#fff}
        .sidebar-nav .nav-link.active{background-color:#ed3636;color:#fff}
        .sidebar-nav .nav-link .fa-fw{margin-right:10px}
        .main-content{padding:2rem;width:100%}
        .mobile-navbar{background-color:#fff;box-shadow:0 2px 4px rgba(0,0,0,.05)}
        .table-responsive{border-radius:15px;overflow:hidden;box-shadow:0 8px 25px rgba(0,0,0,.07)}
        .sidebar-footer { border-top: 1px solid #495057; padding: 1rem 1.5rem; }
    </style>
</head>
<body>
<div class="wrapper">
    <!-- Sidebar (Desktop View) -->
    <div class="sidebar d-none d-lg-flex flex-column">
        <a class="navbar-brand" href="staff-dashboard.html"><img src="logo.svg" alt="AuthoDocs Logo"></a>
        <ul class="nav flex-column sidebar-nav flex-grow-1">
            <li class="nav-item"><a class="nav-link" href="staff-dashboard.html"><i class="fas fa-home fa-fw"></i> Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="staff-pending-requests.html"><i class="fas fa-inbox fa-fw"></i> Pending Requests <span class="badge bg-danger ms-2" id="pendingCount">0</span></a></li>
            <li class="nav-item"><a class="nav-link active" href="staff-student-info.html"><i class="fas fa-users fa-fw"></i> Student Info</a></li>
            <li class="nav-item"><a class="nav-link" href="staff-document-log.html"><i class="fas fa-history fa-fw"></i> Document Log</a></li>
        </ul>
        <div class="sidebar-footer">
            <div class="d-flex align-items-center mb-3">
                <i class="fas fa-user-circle fa-2x me-2"></i>
                <div><h6 class="mb-0 text-white" id="staffName">Staff Member</h6><small>Role: Staff</small></div>
            </div>
            <a href="login.html" class="btn btn-danger w-100"><i class="fas fa-sign-out-alt fa-fw me-2"></i>Logout</a>
        </div>
    </div>

    <div class="flex-fill">
        <!-- Mobile Navbar -->
        <nav class="navbar d-lg-none mobile-navbar">
            <div class="container-fluid">
                <a class="navbar-brand" href="staff-dashboard.html"><img src="logo.svg" alt="AuthoDocs Logo"></a>
            </div>
        </nav>

        <main class="main-content">
            <h1 class="mb-4">Student Information</h1>
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <input type="text" class="form-control" id="searchInput" placeholder="Search by Student Name or ID...">
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="departmentSelect">
                        <option value="">All Departments</option>
                        <option>Computer Science</option>
                        <option>Information Technology</option>
                        <option>Electronics</option>
                        <option>Mechanical</option>
                        <option>Civil</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="yearSelect">
                        <option value="">All Years</option>
                        <option value="1">First Year</option>
                        <option value="2">Second Year</option>
                        <option value="3">Third Year</option>
                    </select>
                </div>
                <div class="col-md-2 d-grid">
                    <button class="btn btn-danger" type="button" id="searchBtn">Apply Filters</button>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle bg-white">
                    <thead class="table-dark">
                        <tr>
                            <th>Student ID</th>
                            <th>Full Name</th>
                            <th>Email</th>
                            <th>Department</th>
                            <th>Year</th>
                            <th>Class</th>
                        </tr>
                    </thead>
                    <tbody id="studentsTable">
                        <tr><td colspan="6" class="text-center">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.socket.io/4.7.1/socket.io.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {
  const token = localStorage.getItem("token");
  if (!token) {
    alert("Please login as staff first.");
    window.location.href = "login.html";
    return;
  }

  const tbody = document.querySelector("#studentsTable");
  const searchInput = document.getElementById("searchInput");

  async function loadStudents(query = "") {
    tbody.innerHTML = `<tr><td colspan="6" class="text-center">Loading...</td></tr>`;
    try {
      const department = document.getElementById("departmentSelect").value.trim();
      const year = document.getElementById("yearSelect").value.trim();
      const params = new URLSearchParams();
      if (query) params.append("search", query);
      if (department) params.append("department", department);
      if (year) params.append("year", year);
      const qs = params.toString();
      const url = `http://localhost:5001/api/students${qs ? "?" + qs : ""}`;

      const res = await fetch(url, {
        headers: { "Authorization": `Bearer ${token}` }
      });

      if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
      const students = await res.json();

      if (!students.length) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-center">No students found</td></tr>`;
        return;
      }

      tbody.innerHTML = "";
      students.forEach(student => {
        const tr = document.createElement("tr");
        const yearNum = typeof student.year === 'string' ? parseInt(student.year, 10) : student.year;
        const yearLabel = yearNum === 1 ? "First Year" : (yearNum === 2 ? "Second Year" : (yearNum === 3 ? "Third Year" : (student.year || "-")));
        tr.innerHTML = `
          <td>${student.studentId || "-"}</td>
          <td>${student.name}</td>
          <td>${student.email}</td>
          <td>${student.department || "-"}</td>
          <td>${yearLabel}</td>
          <td>${student.className || "-"}</td>
        `;
        tbody.appendChild(tr);
      });

    } catch (err) {
      console.error("Error loading students:", err);
      tbody.innerHTML = `<tr><td colspan="4" class="text-center">Failed to load students</td></tr>`;
    }
  }

  // Load all students on page load
  loadStudents();

  // Search/filters button
  document.getElementById("searchBtn").addEventListener("click", () => {
    loadStudents(searchInput.value.trim());
  });

  searchInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter") {
      loadStudents(searchInput.value.trim());
    }
  });
  document.getElementById("departmentSelect").addEventListener("change", () => loadStudents(searchInput.value.trim()));
  document.getElementById("yearSelect").addEventListener("change", () => loadStudents(searchInput.value.trim()));
});
</script>

</body>
</html>
