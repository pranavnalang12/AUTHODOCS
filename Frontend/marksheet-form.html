<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Marksheet Request</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5">
  <h2 class="mb-4">Marksheet Request</h2>
  <form id="marksheetForm">
    <div class="mb-3">
      <label class="form-label">College Name</label>
      <input type="text" class="form-control" id="collegeName" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Student Name</label>
      <input type="text" class="form-control" id="studentName" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Roll Number</label>
      <input type="text" class="form-control" id="rollNo" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Class</label>
      <input type="text" class="form-control" id="className" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Department</label>
      <input type="text" class="form-control" id="department" required>
    </div>
    <button type="submit" class="btn btn-danger">Generate Marksheet</button>
  </form>

  <script>
  document.getElementById("marksheetForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const data = {
      collegeName: collegeName.value,
      studentName: studentName.value,
      rollNo: rollNo.value,
      className: className.value,
      department: department.value,
    };
    const res = await fetch("http://localhost:5001/api/documents/marksheet", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });
    if (res.ok) {
      const blob = await res.blob();
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "Marksheet.pdf";
      a.click();
    } else {
      alert("Failed to generate document.");
    }
  });
  </script>
</body>
</html>
