`
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bonafide Certificate Request</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container py-5">
  <h2 class="mb-4">Bonafide Certificate Request</h2>

  <form id="bonafideForm">
    <div class="mb-3">
      <label class="form-label">Student Full Name</label>
      <input type="text" class="form-control" id="studentName" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Father's Name</label>
      <input type="text" class="form-control" id="fatherName" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Class</label>
      <input type="text" class="form-control" id="className" required placeholder="FY B.Com / SY B.Sc / etc">
    </div>

    <div class="mb-3">
      <label class="form-label">Department</label>
      <input type="text" class="form-control" id="department" required placeholder="Commerce / Arts / Science">
    </div>

    <div class="mb-3">
      <label class="form-label">Academic Year</label>
      <input type="text" class="form-control" id="year" placeholder="2024-2025" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Date of Birth</label>
      <input type="date" class="form-control" id="birthDate" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Conduct</label>
      <select class="form-select" id="conduct" required>
        <option value="Good">Good</option>
        <option value="Very Good">Very Good</option>
        <option value="Excellent">Excellent</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Remark / Purpose (Optional)</label>
      <input type="text" class="form-control" id="remark" placeholder="For scholarship / For bank account / etc">
    </div>

    <div class="mb-3">
      <label class="form-label">Place</label>
      <input type="text" class="form-control" id="place" value="Kudal" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Date</label>
      <input type="date" class="form-control" id="issueDate" required>
    </div>

    <div class="d-grid">
      <button id="submitBtn" type="submit" class="btn btn-danger">Submit Request</button>
    </div>
  </form>

  <script>
    const form = document.getElementById('bonafideForm');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const payload = {
        type: "bonafide",
        data: {
          studentName: document.getElementById('studentName').value.trim(),
          fatherName: document.getElementById('fatherName').value.trim(),
          className: document.getElementById('className').value.trim(),
          department: document.getElementById('department').value.trim(),
          year: document.getElementById('year').value.trim(),
          birthDate: document.getElementById('birthDate').value,
          conduct: document.getElementById('conduct').value,
          remark: document.getElementById('remark').value.trim(),
          place: document.getElementById('place').value.trim(),
          issueDate: document.getElementById('issueDate').value
        }
      };

      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting...';

      try {
        const token = localStorage.getItem("token");
        if (!token) {
          alert("You are not logged in. Please login first.");
          window.location.href = "login.html";
          return;
        }

        const res = await fetch('http://localhost:5001/api/requests', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const txt = await res.text().catch(() => null);
          throw new Error(txt || `Server returned ${res.status}`);
        }

        alert("✅ Request submitted successfully! Wait for approval.");
        form.reset();
      } catch (err) {
        alert("❌ Failed to submit request: " + err.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Request';
      }
    });
  </script>
</body>
</html>
