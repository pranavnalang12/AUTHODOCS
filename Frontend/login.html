<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - AuthoDocs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-container {
      max-width: 450px;
      width: 100%;
    }

    .login-card {
      border: none;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .1);
      overflow: hidden;
    }

    .login-header {
      text-align: center;
      padding: 2rem 0;
      border-bottom: 1px solid #e9ecef;
    }

    .login-header .brand-name img {
      height: 40px;
    }

    .login-card .card-body {
      padding: 2.5rem;
    }

    .form-control {
      border-radius: 10px;
      padding: .8rem 1rem;
      border: 1px solid #ced4da;
    }

    .form-control:focus {
      border-color: #ed3636;
      box-shadow: 0 0 0 .25rem rgba(237, 54, 54, .25);
    }

    .btn-submit {
      background-color: #ed3636;
      color: #fff;
      font-weight: 700;
      padding: .8rem 1rem;
      border-radius: 10px;
      border: none;
      transition: background-color .3s ease, transform .3s ease;
    }

    .btn-submit:hover {
      background-color: #d42a2a;
      transform: translateY(-2px);
    }

    .footer-text {
      font-size: .9rem;
    }

    .footer-text a {
      color: #ed3636;
      text-decoration: none;
      font-weight: 700;
    }

    #loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 280px;
    }

    .spinner-border {
      width: 3rem;
      height: 3rem;
      color: #ed3636;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="card login-card">
      <div class="login-header">
        <div class="brand-name">
          <img src="logo.svg" alt="AuthoDocs Logo" />
        </div>
      </div>
      <div class="card-body">
        <div id="form-container">
          <h2 class="text-center mb-4">Login</h2>
          <form id="login-form">
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" required />
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" required />
            </div>
            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-submit">Log in</button>
            </div>
          </form>
          <div class="text-center mt-4 footer-text">
            <p>Need to create an account? <a href="register.html">Register here</a></p>
            <p><a href="about.html">About AuthoDocs</a></p>
          </div>
        </div>
        <div id="loader-container" class="d-none">
          <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
          <p class="mt-3" id="loader-text">Authenticating...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("login-form").addEventListener("submit", async function (e) {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        // Show loader
        document.getElementById("form-container").classList.add("d-none");
        document.getElementById("loader-container").classList.remove("d-none");

        const res = await fetch("http://localhost:5001/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          // ✅ Save token, role, name, and EMAIL
          localStorage.setItem("token", data.token);
          localStorage.setItem("role", data.role);
          localStorage.setItem("fullName", data.name);
          localStorage.setItem("email", email); // <-- NEW: Storing the email here

          // ✅ Role-based redirect
          if (data.role === "Student") {
            window.location.href = "student-dashboard.html";
          } else if (data.role === "Staff") {
            window.location.href = "staff-dashboard.html";
          } else {
            alert("Role not recognized: " + data.role);
          }


        } else {
          const isUnauthorized = res.status === 403 && /not authorized/i.test(data.message || "");
          if (isUnauthorized) {
            alert("❌ You are not authorized for this role.");
          } else {
            alert("❌ " + (data.message || "Login failed"));
          }
          // Show form again
          document.getElementById("form-container").classList.remove("d-none");
          document.getElementById("loader-container").classList.add("d-none");
        }
      } catch (err) {
        console.error(err);
        alert("❌ Network or server error");
        // Show form again
        document.getElementById("form-container").classList.remove("d-none");
        document.getElementById("loader-container").classList.add("d-none");
      }
    });
  </script>
</body>
</html>
