<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Transfer Certificate Request</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5">
  <h2 class="mb-4 text-center">Transfer Certificate Request</h2>

  <form id="transferForm" class="border rounded p-4 shadow-sm bg-light">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">College Name</label>
        <input type="text" class="form-control" id="collegeName" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Student Name</label>
        <input type="text" class="form-control" id="studentName" required>
      </div>

      <div class="col-md-6">
        <label class="form-label">Father’s Name</label>
        <input type="text" class="form-control" id="fatherName" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Mother’s Name</label>
        <input type="text" class="form-control" id="motherName" required>
      </div>

      <div class="col-md-4">
        <label class="form-label">Date of Birth</label>
        <input type="date" class="form-control" id="dob" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Nationality</label>
        <input type="text" class="form-control" id="nationality" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Course of Study</label>
        <input type="text" class="form-control" id="course" required>
      </div>

      <div class="col-md-6">
        <label class="form-label">Date of Admission</label>
        <input type="date" class="form-control" id="admissionDate" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Last Class / Semester Studied</label>
        <input type="text" class="form-control" id="lastClass" required>
      </div>

      <div class="col-md-6">
        <label class="form-label">University Last Enrolled</label>
        <input type="text" class="form-control" id="university" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Qualified for Promotion?</label>
        <select class="form-select" id="promotion" required>
          <option value="">Select</option>
          <option value="Yes">Yes</option>
          <option value="No">No</option>
        </select>
      </div>

      <div class="col-md-6">
        <label class="form-label">All Dues Paid?</label>
        <select class="form-select" id="duesPaid" required>
          <option value="">Select</option>
          <option value="Yes">Yes</option>
          <option value="No">No</option>
        </select>
      </div>

      <div class="col-md-6">
        <label class="form-label">Reason for Leaving</label>
        <input type="text" class="form-control" id="reason" required>
      </div>

      <div class="col-md-6">
        <label class="form-label">Date of Leaving College</label>
        <input type="date" class="form-control" id="leavingDate" required>
      </div>

      <div class="col-md-3">
        <label class="form-label">Conduct & Character</label>
        <input type="text" class="form-control" id="conduct" placeholder="e.g. Good" required>
      </div>
      <div class="col-md-9">
        <label class="form-label">General Remarks (if any)</label>
        <input type="text" class="form-control" id="remarks" placeholder="Optional">
      </div>
    </div>

    <div class="d-grid mt-4">
      <button id="submitBtn" type="submit" class="btn btn-danger btn-lg">Submit Request</button>
    </div>
  </form>

  <script>
    document.getElementById("transferForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const token = localStorage.getItem("token");
      if (!token) return alert("Please login first.");

      const payload = {
        type: "transfer",
        data: {
          collegeName: collegeName.value.trim(),
          studentName: studentName.value.trim(),
          fatherName: fatherName.value.trim(),
          motherName: motherName.value.trim(),
          dob: dob.value,
          nationality: nationality.value.trim(),
          course: course.value.trim(),
          admissionDate: admissionDate.value,
          lastClass: lastClass.value.trim(),
          university: university.value.trim(),
          promotion: promotion.value,
          duesPaid: duesPaid.value,
          reason: reason.value.trim(),
          leavingDate: leavingDate.value,
          conduct: conduct.value.trim(),
          remarks: remarks.value.trim()
        }
      };

      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.textContent = "Submitting...";

      try {
        const res = await fetch("http://localhost:5001/api/requests", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error("Failed to submit request");
        alert("Request submitted successfully! Staff will approve it soon.");
        e.target.reset();
      } catch (err) {
        alert("Error: " + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "Submit Request";
      }
    });
  </script>
</body>
</html>
