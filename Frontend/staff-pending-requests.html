<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pending Requests - AuthoDocs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #f8f9fa;
    }
    .wrapper { display: flex; }
    .sidebar {
      width: 280px;
      min-height: 100vh;
      background-color: #212529;
      color: #fff;
      flex-shrink: 0;
    }
    .sidebar .navbar-brand {
      text-align: center;
      display: block;
      padding-top: 1.5rem;
      margin-bottom: 2rem;
    }
    .sidebar .navbar-brand img { height: 40px; }
    .sidebar-nav .nav-link {
      color: #adb5bd;
      font-weight: 500;
      padding: .75rem 1.5rem;
      border-radius: 8px;
    }
    .sidebar-nav .nav-link:hover {
      background-color: #343a40;
      color: #fff;
    }
    .sidebar-nav .nav-link.active {
      background-color: #ed3636;
      color: #fff;
    }
    .sidebar-nav .nav-link .fa-fw { margin-right: 10px; }
    .main-content { padding: 2rem; width: 100%; }
    .mobile-navbar {
      background-color: #fff;
      box-shadow: 0 2px 4px rgba(0,0,0,.05);
    }
    .table-responsive {
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0,0,0,.07);
    }
    .sidebar-footer {
      border-top: 1px solid #495057;
      padding: 1rem 1.5rem;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <!-- Sidebar -->
    <div class="sidebar d-none d-lg-flex flex-column">
      <a class="navbar-brand" href="staff-dashboard.html"><img src="logo.svg" alt="AuthoDocs Logo" /></a>
      <ul class="nav flex-column sidebar-nav flex-grow-1">
        <li class="nav-item"><a class="nav-link" href="staff-dashboard.html"><i class="fas fa-home fa-fw"></i> Dashboard</a></li>
        <li class="nav-item"><a class="nav-link active" href="staff-pending-requests.html"><i class="fas fa-inbox fa-fw"></i> Pending Requests <span class="badge bg-danger ms-2" id="pendingCount">0</span></a></li>
        <li class="nav-item"><a class="nav-link" href="staff-student-info.html"><i class="fas fa-users fa-fw"></i> Student Info</a></li>
        <li class="nav-item"><a class="nav-link" href="staff-document-log.html"><i class="fas fa-history fa-fw"></i> Document Log</a></li>
      </ul>
      <div class="sidebar-footer">
        <div class="d-flex align-items-center mb-3">
          <i class="fas fa-user-circle fa-2x me-2"></i>
          <div>
            <h6 class="mb-0 text-white" id="staffName">Staff Member</h6>
            <small>Role: Staff</small>
          </div>
        </div>
        <button id="logoutBtn" class="btn btn-danger w-100">
          <i class="fas fa-sign-out-alt fa-fw me-2"></i>Logout
        </button>
      </div>
    </div>

    <!-- Main -->
    <div class="flex-fill">
      <!-- Mobile Navbar -->
      <nav class="navbar d-lg-none mobile-navbar">
        <div class="container-fluid">
          <a class="navbar-brand" href="staff-dashboard.html"><img src="logo.svg" alt="AuthoDocs Logo" /></a>
        </div>
      </nav>

      <main class="main-content">
        <h1 class="mb-4">Pending Document Requests</h1>
        <div class="table-responsive">
          <table class="table table-striped table-hover align-middle bg-white">
            <thead class="table-dark">
              <tr>
                <th>Request ID</th>
                <th>Student Name</th>
                <th>Document</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="requestsTable">
              <tr><td colspan="5" class="text-center">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {
  const token = localStorage.getItem("token");
  const staffName = localStorage.getItem("fullName") || "Staff Member";
  document.getElementById("staffName").innerText = staffName;

  if (!token) {
    alert("Please login as staff first.");
    window.location.href = "login.html";
    return;
  }

  const tbody = document.getElementById("requestsTable");

  function bindRowActions(tr) {
    const approveBtn = tr.querySelector(".approve-btn");
    const rejectBtn = tr.querySelector(".reject-btn");
    if (approveBtn) approveBtn.addEventListener("click", () => updateStatus(approveBtn.dataset.id, "approved"));
    if (rejectBtn) rejectBtn.addEventListener("click", () => updateStatus(rejectBtn.dataset.id, "rejected"));
  }

  async function loadRequests() {
    tbody.innerHTML = `<tr><td colspan="5" class="text-center">Loading...</td></tr>`;
    try {
      const res = await fetch("http://localhost:5001/api/requests", {
        headers: { "Authorization": `Bearer ${token}` }
      });

      let data;
      try {
        data = await res.json();
      } catch {
        const text = await res.text();
        throw new Error(text || "Invalid server response.");
      }

      // Normalize API response to an array
      const list = Array.isArray(data) ? data : (Array.isArray(data?.requests) ? data.requests : []);

      tbody.innerHTML = "";
      let pendingCount = 0;

      list.forEach(req => {
        if (req.status === "pending") {
          pendingCount++;
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${req._id}</td>
            <td>${req.data?.studentName || "Unknown"}</td>
            <td>${req.type}</td>
            <td>${new Date(req.createdAt).toLocaleDateString()}</td>
            <td>
              <button class="btn btn-success btn-sm approve-btn" data-id="${req._id}">Approve</button>
              <button class="btn btn-danger btn-sm reject-btn" data-id="${req._id}">Reject</button>
            </td>
          `;
          tbody.appendChild(tr);
          bindRowActions(tr);
        }
      });

      if (pendingCount === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="text-center">No pending requests</td></tr>`;
      }

      document.getElementById("pendingCount").innerText = pendingCount;

      // Existing rows already have actions bound above

    } catch (err) {
      console.error(err);
      tbody.innerHTML = `<tr><td colspan="5" class="text-center">Error loading requests</td></tr>`;
      alert("Failed to load requests: " + err.message);
    }
  }

  async function updateStatus(id, status) {
    try {
      const res = await fetch(`http://localhost:5001/api/requests/${id}`, { // <-- fixed URL
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify({ status })
      });

      let result;
      try {
        result = await res.json();
      } catch {
        const text = await res.text();
        throw new Error(text || "Invalid server response");
      }

      if (res.ok) {
        alert(`Request ${status} successfully.`);
        loadRequests();
      } else {
        alert(result.message || "Failed to update request.");
      }
    } catch (err) {
      console.error(err);
      alert("Error updating request: " + err.message);
    }
  }

  // Initial load
  loadRequests();

  // ===== Real-time updates via Socket.IO =====
  try {
    const socket = io("http://localhost:5001");

    socket.on("connect", () => {
      console.log("🔌 Staff connected to Socket.IO");
    });

    // When a student submits a new request
    socket.on("newRequest", ({ request }) => {
      if (!request || request.status !== "pending") return;

      // Avoid duplicates if present
      const existing = Array.from(tbody.querySelectorAll("tr")).find(r => r.firstElementChild && r.firstElementChild.textContent === request._id);
      if (existing) return;

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${request._id}</td>
        <td>${request.data?.studentName || "Unknown"}</td>
        <td>${request.type}</td>
        <td>${new Date(request.createdAt).toLocaleDateString()}</td>
        <td>
          <button class="btn btn-success btn-sm approve-btn" data-id="${request._id}">Approve</button>
          <button class="btn btn-danger btn-sm reject-btn" data-id="${request._id}">Reject</button>
        </td>
      `;
      // If table was showing "No pending requests" or "Loading...", clear it
      const rows = tbody.querySelectorAll("tr");
      if (rows.length === 1 && rows[0].children.length === 1) {
        tbody.innerHTML = "";
      }
      tbody.prepend(tr);
      bindRowActions(tr);

      // Increment pending badge
      const badge = document.getElementById("pendingCount");
      badge.innerText = String((parseInt(badge.innerText || "0") || 0) + 1);
    });

    // When a request status is updated elsewhere
    socket.on("requestUpdated", ({ request }) => {
      if (!request) return;
      // Find the row by Request ID and remove if it is no longer pending
      const rows = Array.from(tbody.querySelectorAll("tr"));
      for (const r of rows) {
        if (r.firstElementChild && r.firstElementChild.textContent === request._id) {
          if (request.status !== "pending") {
            r.remove();
            const badge = document.getElementById("pendingCount");
            badge.innerText = String(Math.max(0, (parseInt(badge.innerText || "0") || 0) - 1));
            if (!tbody.querySelector("tr")) {
              tbody.innerHTML = `<tr><td colspan="5" class="text-center">No pending requests</td></tr>`;
            }
          }
          break;
        }
      }
    });
  } catch (e) {
    console.warn("Socket.IO not available:", e);
  }

  // Logout
  document.getElementById("logoutBtn").addEventListener("click", () => {
    localStorage.clear();
    window.location.href = "login.html";
  });
});
</script>


</body>
</html>
