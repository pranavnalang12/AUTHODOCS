<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Log - AuthoDocs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background-color:#f8f9fa}
    .wrapper{display:flex}
    .sidebar{width:280px;min-height:100vh;background-color:#212529;color:#fff;flex-shrink:0}
    .sidebar .navbar-brand{text-align:center;display:block;padding-top:1.5rem;margin-bottom:2rem}
    .sidebar .navbar-brand img{height:40px}
    .sidebar-nav .nav-link{color:#adb5bd;font-weight:500;padding:.75rem 1.5rem;border-radius:8px}
    .sidebar-nav .nav-link:hover{background-color:#343a40;color:#fff}
    .sidebar-nav .nav-link.active{background-color:#ed3636;color:#fff}
    .sidebar-nav .nav-link .fa-fw{margin-right:10px}
    .main-content{padding:2rem;width:100%}
    .mobile-navbar{background-color:#fff;box-shadow:0 2px 4px rgba(0,0,0,.05)}
    .table-responsive{border-radius:15px;overflow:hidden;box-shadow:0 8px 25px rgba(0,0,0,.07)}
    .sidebar-footer { border-top: 1px solid #495057; padding: 1rem 1.5rem; }
  </style>
</head>
<body>
  <div class="wrapper">
    <!-- Sidebar (Desktop View) -->
    <div class="sidebar d-none d-lg-flex flex-column">
      <a class="navbar-brand" href="staff-dashboard.html"><img src="logo.svg" alt="AuthoDocs Logo"></a>
      <ul class="nav flex-column sidebar-nav flex-grow-1">
        <li class="nav-item"><a class="nav-link" href="staff-dashboard.html"><i class="fas fa-home fa-fw"></i> Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="staff-pending-requests.html"><i class="fas fa-inbox fa-fw"></i> Pending Requests <span class="badge bg-danger ms-2">2</span></a></li>
        <li class="nav-item"><a class="nav-link" href="staff-student-info.html"><i class="fas fa-users fa-fw"></i> Student Info</a></li>
        <li class="nav-item"><a class="nav-link active" href="staff-document-log.html"><i class="fas fa-history fa-fw"></i> Document Log</a></li>
      </ul>
      <div class="sidebar-footer">
        <div class="d-flex align-items-center mb-3">
          <i class="fas fa-user-circle fa-2x me-2"></i>
          <div><h6 class="mb-0 text-white">Staff Member</h6><small>Role: Staff</small></div>
        </div>
        <a href="login.html" class="btn btn-danger w-100"><i class="fas fa-sign-out-alt fa-fw me-2"></i>Logout</a>
      </div>
    </div>

    <div class="flex-fill">
      <!-- Mobile Navbar -->
      <nav class="navbar d-lg-none mobile-navbar">
        <div class="container-fluid">
          <a class="navbar-brand" href="staff-dashboard.html"><img src="logo.svg" alt="AuthoDocs Logo"></a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mobileNav"><span class="navbar-toggler-icon"></span></button>
          <div class="collapse navbar-collapse" id="mobileNav">
            <ul class="navbar-nav mt-3">
              <li class="nav-item"><a class="nav-link" href="staff-dashboard.html">Dashboard</a></li>
              <li class="nav-item"><a class="nav-link" href="staff-pending-requests.html">Pending Requests</a></li>
              <li class="nav-item"><a class="nav-link" href="staff-student-info.html">Student Info</a></li>
              <li class="nav-item"><a class="nav-link active" href="staff-document-log.html">Document Log</a></li>
              <li class="nav-item dropdown mt-2">
                <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"><i class="fas fa-user me-1"></i> Profile</a>
                <ul class="dropdown-menu">
                  <li><h6 class="dropdown-header">Staff Member</h6></li>
                  <li><p class="dropdown-item-text"><small class="text-muted">Role: Staff</small></p></li>
                  <li><hr class="dropdown-divider"></li>
                  <li><a class="dropdown-item" href="login.html">Logout</a></li>
                </ul>
              </li>
            </ul>
          </div>
        </div>
      </nav>

      <!-- Main Content -->
      <main class="main-content">
        <h1 class="mb-4">Document Activity Log</h1>
        <div class="table-responsive">
          <table class="table table-hover align-middle bg-white">
            <thead class="table-dark">
              <tr>
                <th>Log ID</th>
                <th>Action</th>
                <th>Details</th>
                <th>Timestamp</th>
              </tr>
            </thead>
            <tbody>
              <!-- Rows will be populated dynamically -->
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const token = localStorage.getItem("token");
      if (!token) {
        alert("Please login as staff first.");
        window.location.href = "login.html";
        return;
      }

      try {
        const res = await fetch("http://localhost:5001/api/requests", {
          headers: { "Authorization": `Bearer ${token}` }
        });
        const data = await res.json();
        const tbody = document.querySelector("tbody");
        tbody.innerHTML = "";

        data.forEach(req => {
          if (req.status === "approved") {
            const tr = document.createElement("tr");
            const approverName = req.approvedBy && req.approvedBy.name ? req.approvedBy.name : (req.approvedBy || "Unknown");
            const studentName = (req.data && req.data.studentName) ? req.data.studentName : (req.createdBy && req.createdBy.name ? req.createdBy.name : "Unknown Student");
            tr.innerHTML = `
              <td>${req._id}</td>
              <td><span class="badge bg-success">Request Approved</span></td>
              <td>${approverName} approved '${req.type}' for ${studentName}</td>
              <td>${new Date(req.updatedAt).toLocaleString()}</td>
            `;
            tbody.appendChild(tr);
          }
        });
      } catch (err) {
        console.error(err);
        alert("Failed to load document log.");
      }
    });
  </script>
</body>
</html>
