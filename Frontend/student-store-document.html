</nav>

<!-- Main Container -->
<main class="container py-5">

  <!-- Upload Form -->
  <div class="dashboard-card p-5">
    <h2>📤 Store Your Document</h2>
    <form id="uploadForm">
      <div class="mb-3">
        <label for="docName" class="form-label">Document Name</label>
        <input type="text" class="form-control" id="docName" placeholder="e.g., Passport" required>
      </div>
      <div class="mb-3">
        <label for="docFile" class="form-label">Select File</label>
        <input class="form-control" type="file" id="docFile" required>
      </div>
      <div class="d-grid mt-4">
        <button type="submit" class="btn btn-brand btn-lg">Upload & Store</button>
      </div>
    </form>
    <div id="uploadResult" class="mt-3"></div>
  </div>

  <!-- Stored Documents List -->
  <div class="dashboard-card p-4">
    <h2>📂 Your Stored Documents</h2>
    <div id="documentsList">
      <p class="text-muted text-center">No documents uploaded yet.</p>
    </div>
  </div>

</main>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const token = localStorage.getItem('token');
  const userName = localStorage.getItem('fullName');
  const userEmail = localStorage.getItem('email');
  const userRole = localStorage.getItem('role');

  if (!token || !userRole || userRole !== 'Student') {
    window.location.href = 'login.html';
    return;
  }

  // Navbar info
  document.getElementById('navUserName').textContent = userName || 'User';
  document.getElementById('dropdownUserName').textContent = userName || 'User';
  document.getElementById('dropdownUserRole').textContent = `Role: ${userRole || 'N/A'}`;
  document.getElementById('dropdownUserEmail').textContent = `Email: ${userEmail || 'N/A'}`;

  document.getElementById('logoutButton').addEventListener('click', (e) => {
    e.preventDefault();
    localStorage.clear();
    window.location.href = 'login.html';
  });

  async function fetchDocuments() {
    try {
      console.log("Fetching documents for authenticated user...");
      const res = await fetch(`http://localhost:5001/api/documents/user/me`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (res.status === 401 || res.status === 403) {
        // Unauthorized/forbidden — show login
        console.warn("Auth failed while fetching documents:", res.status);
        alert("Session expired or unauthorized. Please login again.");
        localStorage.clear();
        window.location.href = 'login.html';
        return;
      }

      const data = await res.json();
      const list = document.getElementById('documentsList');
      list.innerHTML = '';

      if (data.success && data.documents && data.documents.length) {
        data.documents.forEach(doc => {
          const item = document.createElement('div');
          item.className = 'document-item';
          item.innerHTML = `
            <span>${doc.docName || doc.fileName}</span>
            <div>
              <a href="${doc.fileUrl}" target="_blank" class="btn btn-sm btn-outline-brand me-2">
                <i class="fas fa-eye me-1"></i>View
              </a>
              <button class="btn btn-sm btn-outline-brand me-2 download-btn">
                <i class="fas fa-download me-1"></i>Download
              </button>
              <button class="btn btn-sm btn-danger delete-btn">
                <i class="fas fa-trash me-1"></i>Delete
              </button>
            </div>
          `;

          const downloadBtn = item.querySelector('.download-btn');
          downloadBtn.addEventListener('click', () => downloadDocument(doc.fileName, doc._id));

          const deleteBtn = item.querySelector('.delete-btn');
          deleteBtn.addEventListener('click', () => deleteDocument(doc._id));

          list.appendChild(item);
        });
      } else {
        list.innerHTML = '<p class="text-muted text-center">No documents uploaded yet.</p>';
      }
    } catch (err) {
      console.error('Error fetching documents:', err);
      document.getElementById('documentsList').innerHTML = '<p class="text-danger text-center">Failed to load documents.</p>';
    }
  }

  async function downloadDocument(fileName, docId) {
    try {
      const res = await fetch(`http://localhost:5001/api/documents/download/${encodeURIComponent(fileName)}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (res.status === 404) {
        alert("❌ File not found. Removing from dashboard...");
        await deleteDocument(docId, true);
        return;
      }

      if (res.status === 403) {
        alert("❌ You are not authorized to download this file.");
        return;
      }

      if (!res.ok) throw new Error('Download failed');
      const blob = await res.blob();
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      window.URL.revokeObjectURL(url);
    } catch (err) {
      console.error('Download error:', err);
      alert('❌ Download failed: ' + err.message);
    }
  }

  async function deleteDocument(docId, silent = false) {
    if (!silent && !confirm("Are you sure you want to delete this document?")) return;

    try {
      const res = await fetch(`http://localhost:5001/api/documents/delete/${docId}`, {
        method: "DELETE",
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      if (data.success) {
        if (!silent) alert("✅ Document deleted successfully");
        fetchDocuments();
      } else {
        alert("❌ Delete failed: " + data.message);
      }
    } catch (err) {
      console.error("Delete error:", err);
      alert("❌ Delete failed: " + err.message);
    }
  }

  document.getElementById("uploadForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const docName = document.getElementById("docName").value;
    const file = document.getElementById("docFile").files[0];
    if (!file) { alert("Please select a file first!"); return; }

    const formData = new FormData();
    formData.append("document", file);
    formData.append("docName", docName);

    try {
      const res = await fetch("http://localhost:5001/api/documents/upload", {
        method: "POST",
        headers: { 'Authorization': `Bearer ${token}` },
        body: formData
      });
      const data = await res.json();
      const resultDiv = document.getElementById("uploadResult");
      if (data.success) {
        resultDiv.innerHTML = `<p class="text-success">✅ Uploaded Successfully!</p>`;
        document.getElementById("uploadForm").reset();
        fetchDocuments();
      } else {
        resultDiv.innerHTML = `<p class="text-danger">❌ Upload Failed: ${data.message}</p>`;
      }
    } catch (err) {
      console.error("Upload error:", err);
      document.getElementById("uploadResult").innerHTML = `<p class="text-danger">⚠️ Error: ${err.message}</p>`;
    }
  });

  // initial load
  fetchDocuments();
});
</script>
</body>
