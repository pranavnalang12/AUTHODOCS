<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Leaving Certificate Request</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .card { max-width: 750px; margin: auto; }
    .required::after { content: " *"; color: red; }
  </style>
</head>
<body class="py-5">
  <div class="card shadow p-4">
    <h2 class="text-center mb-4">Leaving Certificate Request</h2>

    <div id="alertBox"></div>

    <form id="leavingForm" novalidate>
      <div class="mb-3">
        <label class="form-label required">College Name</label>
        <input type="text" id="collegeName" class="form-control" value="Sant Rawool Maharaj College" required>
        <div class="invalid-feedback">College name is required.</div>
      </div>

      <div class="mb-3">
        <label class="form-label required">Student Name</label>
        <input type="text" id="studentName" class="form-control" required>
        <div class="invalid-feedback">Student name is required.</div>
      </div>

      <div class="mb-3">
        <label class="form-label required">Course</label>
        <input type="text" id="course" class="form-control" placeholder="e.g. BSc Computer Science" required>
        <div class="invalid-feedback">Course is required.</div>
      </div>

      <div class="mb-3">
        <label class="form-label required">Last Class Attended</label>
        <input type="text" id="lastClass" class="form-control" placeholder="e.g. FY, SY, TY" required>
        <div class="invalid-feedback">Last Class is required.</div>
      </div>

      <div class="mb-3">
        <label class="form-label required">Date of Birth</label>
        <input type="date" id="dob" class="form-control" required>
        <div class="invalid-feedback">Date of Birth is required.</div>
      </div>

      <div class="mb-3">
        <label class="form-label required">Leaving Date</label>
        <input type="date" id="leavingDate" class="form-control" required>
        <div class="invalid-feedback">Leaving date is required.</div>
      </div>

      <div class="mb-3">
        <label class="form-label required">Reason for Leaving</label>
        <textarea id="reason" class="form-control" rows="2" required></textarea>
        <div class="invalid-feedback">Reason is required.</div>
      </div>

      <button id="submitBtn" type="submit" class="btn btn-danger w-100">Submit Request</button>
    </form>
  </div>

  <script>
    const form = document.getElementById("leavingForm");
    const submitBtn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!form.checkValidity()) {
        form.classList.add("was-validated");
        return;
      }

      const token = localStorage.getItem("token");
      if (!token) return showAlert("Please login first.", "danger");

      const payload = {
        type: "leaving",
        data: {
          collegeName: collegeName.value.trim(),
          studentName: studentName.value.trim(),
          course: course.value.trim(),
          lastClass: lastClass.value.trim(),
          dob: dob.value,
          leavingDate: leavingDate.value,
          reason: reason.value.trim()
        }
      };

      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting...";

      try {
        const res = await fetch("http://localhost:5001/api/requests", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify(payload)
        });

        if (!res.ok) throw new Error("Failed to submit request");
        showAlert("✅ Request submitted successfully! Staff will review it soon.", "success");
        form.reset();
        form.classList.remove("was-validated");
      } catch (err) {
        showAlert("❌ " + err.message, "danger");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit Request";
      }
    });

    function showAlert(message, type = "info") {
      document.getElementById("alertBox").innerHTML =
        `<div class="alert alert-${type}">${message}</div>`;
    }
  </script>
</body>
</html>
